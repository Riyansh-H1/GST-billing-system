<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGST - Invoice History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg dashboard-navbar">
        <div class="container">
            <a class="navbar-brand brand-box" href="invoice.html">
                <img src="images/logo.jpg" alt="SmartGST logo">
                <span>SmartGST</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="dashboardMenu">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="invoice.html">Invoice</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="history.html">History</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn logout-btn" id="logoutBtn">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h1 class="text-center fw-bold mb-4 mt-4">
        Invoice History
    </h1>

    <div class="container mt-5">
        <div class="card shadow-lg">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Invoice ID</th>
                                <th>customer Name</th>
                                <th>Date</th>
                                <th>Grand Total</th>
                                <th>Actions</th>

                            </tr>
                        </thead>

                        <tbody id="historyTableBody">

                        </tbody>
                    </table>


                </div>
            </div>
        </div>
    </div>

    <script src="./js/history.js"></script>

    <footer class="text-center mt-5 mb-3 text-muted">
        SmartGST Billing System © 2026
    </footer>
    <div class="modal fade" id="customModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">

                <div class="modal-header text-white" style="background-color:#141b41;">

                    <h5 class="modal-title">GST Billing System</h5>

                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body" style="background-color:#98b9f2; color:#141b41;">

                    <p id="modalMessage" class="mb-0 fw-semibold"></p>

                </div>

                <div class="modal-footer" style="background-color:#6f9ceb;">

                    <button type="button" class="btn text-white" data-bs-dismiss="modal"
                        style="background-color:#306bac;">

                        Close

                    </button>

                </div>

            </div>
        </div>
    </div>
</body>

</html>
