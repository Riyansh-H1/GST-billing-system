<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>GST Billing System - Create Invoice</h1>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <input class="form-control mb-2 mt-3">
                <div class="customer-details">
                    <h2>Customer Details</h2>
                    <form>
                        <label>Customer Name:</label>
                        <input type="text" id="customerName" placeholder="Enter Customer name">

                        <label>Phone Number:</label>
                        <input type="tel" id="phoneNumber" placeholder="Enter Phone No.">

                        <label>Address:</label>
                        <textarea id="address" placeholder="Enter Address of Customer"></textarea>
                    </form>
                </div>


                <div class="invoice-items">
                    <h2>Invoice Items</h2>
                    <button id="addProductBtn btn-primary">+ Add Product</button>
                    <table>
                        <thead>
                            <tr>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>GST%</th>
                                <th>Total</th>
                                <th>Action </th>
                            </tr>
                        </thead>

                        <tbody id="productTableBody">

                        </tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-4">

                <div class="invoice-summary col-md-4">
                    <h2>Invoice Summary</h2>
                    <p id="subtotal">Subtotal: ₹0</p>
                    <p id="cgst">CGST: ₹0</p>
                    <p id="sgst">SGST: ₹0</p>
                    <p id="grandtotal">Grand Total: ₹0</p>

                </div>
            </div>
        </div>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
