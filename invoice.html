<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGST - Create Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg dashboard-navbar">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="dashboardMenu">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="invoice.html">Invoice</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="history.html">History</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn logout-btn" id="logoutBtn">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h1 class="text-center mb-4 fw-bold">GST Billing System - Create Invoice</h1>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body p-3">
                        <div class="customer-details">
                            <h2>Customer Details</h2>
                            <form>
                                <label class="form-label fw-bold mt-3">Customer Name:</label>
                                <input type="text" id="customerName" placeholder="Enter Customer name"
                                    class="form-control mb-3" required>

                                <label class="form-label fw-bold mt-3">Phone Number:</label>
                                <input type="text" pattern="[0-9]{10}" id="phoneNumber" placeholder="Enter Phone No."
                                    class="form-control mb-3" maxlength="10">

                                <label class="form-label fw-bold mt-3">Address:</label>
                                <textarea id="address" placeholder="Enter Address of Customer"
                                    class="form-control mb-3"></textarea>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="card shadow-lg mt-4">
                    <div class="card-body">
                        <div class="invoice-items">
                            <h2>Invoice Items</h2>
                            <button id="addProductBtn" class="btn btn-primary mb-3">+ Add Product</button>
                            <div class="table-responsive">
                                <table class="table table-bordered table-hover">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>Product Name</th>
                                            <th>Price</th>
                                            <th>Quantity</th>
                                            <th>GST%</th>
                                            <th>Total</th>
                                            <th>Action </th>
                                        </tr>
                                    </thead>

                                    <tbody id="productTableBody">

                                    </tbody>
                                </table>
                                <button id="saveInvoiceBtn" class="btn btn-success w-100 mt-3">Save Invoice</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">

                <div class="card">
                    <div class="card-body p-3">
                        <div class="invoice-summary">
                            <h2>Invoice Summary</h2>
                            <p id="subtotal">Subtotal: ₹0</p>
                            <p id="cgst">CGST: ₹0</p>
                            <p id="sgst">SGST: ₹0</p>
                            <p id="grandtotal" class="fw-bold fs-5 text-success">Grand Total: ₹0</p>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="./js/script.js"></script>

    <footer class="text-center mt-5 mb-3 text-muted">
        SmartGST Billing System © 2026
    </footer>
</body>

</html>
