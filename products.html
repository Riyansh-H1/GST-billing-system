<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartGST Products</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/products.css">
</head>

<body>    
    <nav class="navbar navbar-expand-lg dashboard-navbar">
        <div class="container">
            <a class="navbar-brand brand-box" href="dashboard.html">
                <img src="images/logo.jpg" alt="SmartGST logo">
                <span>SmartGST</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="dashboardMenu">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="invoice.html">Invoice</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="history.html">History</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn logout-btn" id="logoutBtn">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            SmartGST Product Management
        </h1>

        <!-- Product Form -->
        <div class="card p-4 shadow">

            <h3 class="mb-3">Add Product</h3>

            <form id="productForm">

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Product Name
                        </label>

                        <input type="text" id="productName" class="form-control" placeholder="Enter product name"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Price
                        </label>

                        <input type="number" id="productPrice" class="form-control" placeholder="Enter price" required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            GST %
                        </label>

                        <input type="number" id="productGST" class="form-control" placeholder="Enter GST" required>

                    </div>

                </div>

                <button type="submit" class="btn btn-primary">
                    Add Product
                </button>

            </form>

        </div>

        <!-- Product Table -->
        <div class="card p-4 shadow mt-5">

            <h3 class="mb-3">Product List</h3>

            <div class="table-responsive">

                <table class="table table-bordered table-hover text-center">

                    <thead class="table-dark">

                        <tr>

                            <th>#</th>
                            <th>Product Name</th>
                            <th>Price</th>
                            <th>GST %</th>
                            <th>Final Price</th>
                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="productTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Your JS -->
    <script src="js/products.js"></script>
    <div class="modal fade" id="customModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">

                <div class="modal-header text-white" style="background-color:#141b41;">

                    <h5 class="modal-title">GST Billing System</h5>

                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body" style="background-color:#98b9f2; color:#141b41;">

                    <p id="modalMessage" class="mb-0 fw-semibold"></p>

                </div>

                <div class="modal-footer" style="background-color:#6f9ceb;">

                    <button type="button" class="btn text-white" data-bs-dismiss="modal"
                        style="background-color:#306bac;">

                        Close

                    </button>

                </div>

            </div>
        </div>
    </div>
</body>

</html>
